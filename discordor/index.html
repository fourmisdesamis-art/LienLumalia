<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Redirection vers le Discord de Lumalia Or...</title>

    <link rel="icon" href="../logo-lumalia.png">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Poppins,sans-serif;
        }

        body{
            background:#0d1117;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
            overflow:hidden;
        }

        body::before{
            content:"";
            position:fixed;
            inset:0;
            background:
                radial-gradient(circle at top left,#4f46e5 0%,transparent 35%),
                radial-gradient(circle at bottom right,#7c3aed 0%,transparent 35%);
            filter:blur(100px);
            opacity:.8;
        }

        .card{
            position:relative;
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,.12);
            border-radius:22px;
            padding:45px;
            width:420px;
            max-width:90%;
        }

        img{
            width:90px;
            margin-bottom:20px;
            animation:spin 2s linear infinite;
        }

        h1{
            margin-bottom:15px;
        }

        p{
            color:#c8d1dc;
            margin-bottom:25px;
        }

        a{
            display:inline-block;
            padding:14px 22px;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            color:white;
            text-decoration:none;
            border-radius:12px;
            font-weight:600;
        }

        @keyframes spin{

            from{
                transform:rotate(0deg);
            }

            to{
                transform:rotate(360deg);
            }

        }

    </style>

</head>
<body>

<div class="card">

    <img src="../logo-lumalia.png" alt="Logo Lumalia">

    <h1>Redirection...</h1>

    <p>
        Vous allez être redirigé vers le serveur Discord du serveur Or de Lumalia.
    </p>

    <a href="https://discord.gg/fUUhTCR2Ah">
        Ouvrir Discord
    </a>

</div>

<script>

    setTimeout(() => {

        window.location.replace("https://discord.gg/fUUhTCR2Ah");

    }, 1200);

</script>

</body>
</html>
