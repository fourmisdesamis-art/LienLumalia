<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lien Lumalia</title>

    <link rel="stylesheet" href="style.css">

    <link rel="icon" href="logo-lumalia.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="background"></div>

    <main class="container">

        <img src="logo-lumalia.png" alt="Logo Lumalia" class="logo">

        <h1>Lien Lumalia</h1>

        <p>
            Le service officiel de liens courts de Lumalia.
            <br>
            Partagez facilement tous les liens de l'univers Lumalia.
        </p>

        <div class="search-box">

            <input
                type="text"
                id="search"
                placeholder="Exemple : discord, launcher, wiki..."
            >

            <button id="go">
                Ouvrir
            </button>

        </div>

        <div class="examples">

            <h2>Liens populaires</h2>

            <a href="/discord">lien.lumania.fr/discord</a>
            <a href="/launcher">lien.lumania.fr/launcher</a>
            <a href="/wiki">lien.lumania.fr/wiki</a>
            <a href="/forum">lien.lumania.fr/forum</a>

        </div>

    </main>

    <footer>
        © 2026 Lumalia — Tous droits réservés.
    </footer>

    <script src="main.js"></script>

</body>
</html>
